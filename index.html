<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Amor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h2 { color: #c2185b; margin-bottom: 20px; }
        label { display: block; text-align: left; margin: 10px 0 5px; color: #880e4f; font-weight: bold; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #f8bbd0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: #f06292;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            transition: 0.3s;
        }

        button:hover { background-color: #ec407a; }

        /* Pantalla Sorpresa */
        #sorpresa {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .tarjeta-cerrada {
            background: #c2185b;
            color: white;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(194, 24, 91, 0.4);
            animation: latido 1.5s infinite;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #galeria {
            display: none;
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
        }

        .grid-fotos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .foto {
            width: 100%;
            border-radius: 10px;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .msg-amor { font-size: 24px; color: #ad1457; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="login-box">
        <h2>💖 Nuestro Inicio 💖</h2>
        
        <label>¿Cuál es tu nombre?</label>
        <input type="text" id="nombre" placeholder="Escribe aquí...">

        <label>¿Cuál fue tu primer apodo?</label>
        <select id="apodo">
            <option value="">Selecciona uno...</option>
            <option value="Nae">Nae</option>
            <option value="Naieli">Naieli</option>
            <option value="Pandita">Pandita</option>
            <option value="Ronsoca">Ronsoca</option>
            <option value="Chinita del ande">Chinita del ande</option>
            <option value="bobocha">bobocha</option>
        </select>

        <label>¿Dónde nos conocimos?</label>
        <select id="lugar">
            <option value="">Selecciona el lugar...</option>
            <option value="comedor de artes">comedor de artes</option>
            <option value="entrada a sociales">entrada a sociales</option>
            <option value="tinkuy">tinkuy</option>
            <option value="biblioteca central">biblioteca central</option>
        </select>

        <label>Fecha de nuestra 1era cita</label>
        <input type="text" id="fecha" placeholder="DD/MM/YYYY (Ej: 14/11/2025)">

        <button onclick="validar()">Ingresar ❤️</button>
    </div>

    <div id="sorpresa">
        <div class="msg-amor">¡FELICES 2 MESES AMORZITO! ❤️</div>
        
        <div class="tarjeta-cerrada" id="btn-abrir" onclick="abrirCarta()">
            🎁 Tienes una tarjeta: ABRIR
        </div>

        <div id="galeria">
            <p style="color: #ad1457;">Nuestros mejores momentos:</p>
            <div class="grid-fotos" id="contenedor-fotos">
                </div>
        </div>

        <audio id="musica" loop>
            <source src="NO RECOMENDABLE - Emma.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function validar() {
            const nom = document.getElementById('nombre').value.toLowerCase().trim();
            const apo = document.getElementById('apodo').value;
            const lug = document.getElementById('lugar').value;
            const fec = document.getElementById('fecha').value.trim();

            // Lógica de variantes de nombre
            const nombresValidos = ["naeli", "nahely", "naieli"];
            
            // VALIDACIÓN (Cambia la fecha aquí si no es 14/11/2025)
            if (nombresValidos.includes(nom) && apo === "Pandita" && lug === "comedor de artes" && fec === "14/11/2025") {
                
                document.getElementById('login-box').style.display = 'none';
                document.body.style.display = 'block'; // Ajuste para scroll
                document.getElementById('sorpresa').style.display = 'flex';
                
                // Intentar reproducir música
                const audio = document.getElementById('musica');
                audio.play().catch(e => console.log("Audio esperando interacción"));

            } else {
                alert("Mmm... algo no cuadra, intenta recordar bien las respuestas, amor ❤️");
            }
        }

        function abrirCarta() {
            document.getElementById('btn-abrir').style.display = 'none';
            const galeria = document.getElementById('galeria');
            galeria.style.display = 'block';
            
            const contenedor = document.getElementById('contenedor-fotos');
            // Carga automática de tus 15 fotos .jpeg
            for (let i = 1; i <= 15; i++) {
                const img = document.createElement('img');
                img.src = `foto${i}.jpeg`;
                img.className = 'foto';
                contenedor.appendChild(img);
            }

            // Asegurarse que la música suene al abrir la carta si no sonó antes
            document.getElementById('musica').play();
        }
    </script>
</body>
</html>
