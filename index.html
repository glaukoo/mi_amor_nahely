<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Amor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
        }

        h2 { color: #c2185b; margin-bottom: 20px; }
        label { display: block; text-align: left; margin: 10px 0 5px; color: #880e4f; font-weight: bold; }
        
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #f8bbd0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: white;
            cursor: pointer;
        }

        button {
            background-color: #f06292;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background-color: #ec407a; }

        /* Pantalla Sorpresa */
        #sorpresa {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .tarjeta-cerrada {
            background: #c2185b;
            color: white;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(194, 24, 91, 0.4);
            animation: latido 1.5s infinite;
            text-align: center;
            margin: 20px auto;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #galeria {
            display: none;
            width: 100%;
            max-width: 1000px;
            margin: 30px auto 0;
        }

        /* --- NUEVO ESTILO MASONRY (COMO PINTEREST) --- */
        .galeria-fotos {
            column-count: 1; /* 1 columna en celulares */
            column-gap: 15px;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 2 columnas en pantallas medianas */
        @media (min-width: 600px) {
            .galeria-fotos { column-count: 2; }
        }

        /* 3 columnas en pantallas de PC */
        @media (min-width: 900px) {
            .galeria-fotos { column-count: 3; }
        }

        .foto-card {
            break-inside: avoid; /* Evita que la tarjeta se parta entre columnas */
            margin-bottom: 15px;
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .foto {
            width: 100%;
            height: auto; /* Mantiene la proporción real de cada foto */
            border-radius: 5px;
            display: block;
        }

        .foto-desc {
            font-size: 14.5px;
            margin-top: 12px;
            margin-bottom: 5px;
            color: #880e4f;
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
        }

        .msg-amor { font-size: 24px; color: #ad1457; margin-bottom: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="container" id="login-box">
        <h2>💖 Nuestro Inicio 💖</h2>
        
        <label>¿Cuál fue tu primer apodo?</label>
        <select id="apodo">
            <option value="">Selecciona uno...</option>
            <option value="Nae">Nae</option>
            <option value="bobocha">bobocha</option>
            <option value="Naieli">Naieli</option>
            <option value="Pandita">Pandita</option>
            <option value="Ronsoca">Ronsoca</option>
            <option value="Chinita del ande">Chinita del ande</option>
        </select>

        <label>¿Dónde nos vimos por primera vez?</label>
        <select id="lugar">
            <option value="">Selecciona el lugar...</option>
            <option value="tinkuy">tinkuy</option>
            <option value="biblioteca central">biblioteca central</option>
            <option value="entrada a sociales">entrada a sociales</option>
            <option value="comedor de artes">comedor de artes</option>
            <option value="muyurina">muyurina</option>
        </select>

        <label>Fecha de nuestra 1era cita</label>
        <select id="fecha">
            <option value="">Selecciona la fecha...</option>
            <option value="30/04/2024">30/04/2024</option>
            <option value="08/11/2025">08/11/2025</option>
            <option value="14/11/2025">14/11/2025</option>
            <option value="22/12/2025">22/12/2025</option>
        </select>

        <label>Por último... tu código de la U</label>
        <select id="codigo">
            <option value="">Selecciona tu código...</option>
            <option value="20184451">20184451</option>
            <option value="20191758">20191758</option>
            <option value="20201532">20201532</option>
            <option value="20210045">20210045</option>
        </select>

        <button onclick="validar()">Ingresar ❤️</button>
    </div>

    <div id="sorpresa">
        <div class="msg-amor">¡FELICES 2 MESES AMORZITO! ❤️</div>
        
        <div class="tarjeta-cerrada" id="btn-abrir" onclick="abrirCarta()">
            🎁 Tienes una tarjeta: ABRIR
        </div>

        <div id="galeria">
            <p style="color: #ad1457; text-align: center; font-weight: bold; font-size: 20px;">Nuestros mejores momentos:</p>
            <div id="contenedor-fotos" class="galeria-fotos">
                </div>
        </div>

        <audio id="musica" loop>
            <source src="NO RECOMENDABLE - Emma.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Tus descripciones exactas
        const descripcionesFotos = [
            "Del primer día que vi a la mejor chica del mundo, fatima la caga",
            "De cuando era malo, pero te quería desde siempre",
            "Mira qué hermosa eres...",
            "Cuando compré unas tabas y la pasamos bien en guamanga. Comimos muyuchi",
            "Me encanta comer lo que sea contigo",
            "Una foto que me encanta demasiado, estaba muy feliz de verte",
            "Me gustas demasiado",
            "Si tuviera que pedir un deseo sería despertar siempre a tu lado",
            "Siempre estaré contigo hasta que amaine la marea",
            "Teribles pero felices",
            "TE AMO NAIELI",
            "Siempre lo haré... hasta que un dia me confieses que ya tienes otro amor",
            "Deja de comer grasa si?",
            "De camino a una de las zonas más picantes de lima y luego bajamos pepita en el centro",
            "Cuando se me cayó el diente solo podía pensar en un deseo, ya lo mencioné"
        ];

        function validar() {
            const apo = document.getElementById('apodo').value;
            const lug = document.getElementById('lugar').value;
            const fec = document.getElementById('fecha').value;
            const cod = document.getElementById('codigo').value;

            if (apo === "Naieli" && lug === "entrada a sociales" && fec === "14/11/2025" && cod === "20191758") {
                document.getElementById('login-box').style.display = 'none';
                document.body.style.display = 'block'; 
                document.getElementById('sorpresa').style.display = 'flex';
                
                const audio = document.getElementById('musica');
                audio.play().catch(e => console.log("Audio esperando interacción"));
            } else {
                alert("Mmm... algo no cuadra, revisa bien tus respuestas, amor ❤️");
            }
        }

        function abrirCarta() {
            document.getElementById('btn-abrir').style.display = 'none';
            const galeria = document.getElementById('galeria');
            galeria.style.display = 'block';
            
            const contenedor = document.getElementById('contenedor-fotos');
            contenedor.innerHTML = ""; 

            // Carga dinámica manteniendo el orden y la proporción
            for (let i = 1; i <= 15; i++) {
                const fotoCard = document.createElement('div');
                fotoCard.className = 'foto-card';

                const img = document.createElement('img');
                img.src = `foto${i}.jpeg`;
                img.className = 'foto';
                fotoCard.appendChild(img);

                const descText = document.createElement('p');
                descText.className = 'foto-desc';
                descText.textContent = descripcionesFotos[i - 1];
                fotoCard.appendChild(descText);

                contenedor.appendChild(fotoCard);
            }

            document.getElementById('musica').play();
        }
    </script>
</body>
</html>
